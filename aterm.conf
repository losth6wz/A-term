# -----------------------------------------------------------------------------
[shell]
# -----------------------------------------------------------------------------

# Show the ASCII banner on startup
banner = true

# Maximum number of commands kept in history
history_size = 1000

# Tab stop width used in the shell's own tab expansion
tab_width = 8

# Command to run automatically when the shell starts (blank = none)
# Example: startup_cmd = neofetch
startup_cmd =


# -----------------------------------------------------------------------------
[prompt]
# -----------------------------------------------------------------------------

# Prompt format string.  Available tokens:
#
#   {user}       — current username
#   {host}       — machine hostname
#   {cwd}        — current working directory (forward slashes)
#   {cwd_short}  — working directory with $HOME collapsed to ~
#   {git_branch} — " (branch)" when inside a git repo, else empty
#   {status}     — last exit code, green if 0 else red
#   {sep}        — value of the separator option below
#   {newline}    — literal newline (for two-line prompts)
#
#   {bold}  {dim}  {italic}  {underline}  {reset}
#   {fg:#RRGGBB}   {bg:#RRGGBB}
#

# Default: "user ~/path >"
format = {bold}{fg:#CC88FF}{user}{reset} {bold}{fg:#5599FF}{cwd_short}{reset}{git_branch} {bold}{fg:#55FF88}>{reset} 

# Two-line prompt example:
# format = {bold}{fg:#CC88FF}{user}{reset}@{host} {bold}{fg:#5599FF}{cwd}{reset}{git_branch}{newline}{bold}{fg:#55FF88}${reset} 

# Git-aware prompt examples:
# format = {bold}{fg:#FFD700}[{user}@{host}]{reset} {fg:#87CEEB}{cwd_short}{reset}{git_branch} {bold}${reset} 

# Show the current git branch next to the path
show_git = true

# Symbol appended to the branch name when there are uncommitted changes
git_dirty_symbol = *

# Optional separator character (referenced as {sep} in format)
separator =


# -----------------------------------------------------------------------------
[aliases]
# -----------------------------------------------------------------------------
# Define command aliases.  The alias name is the command the user types;
# the value is the command (and optional arguments) that gets executed.
# Aliases are expanded before built-ins and external executables.
#
ll = ls
la = ls
py = python
cls = clear


# -----------------------------------------------------------------------------
[env]
# -----------------------------------------------------------------------------
# Extra environment variables injected into the shell process.
# EDITOR = notepad
# PAGER  = more


# -----------------------------------------------------------------------------
[keybindings]
# -----------------------------------------------------------------------------
# Format: Modifier+Modifier+Key
# Modifiers: Ctrl  Shift  Alt  Meta
# Keys: A-Z  0-9  F1-F12  Equal  Minus  PageUp  PageDown  Home  End
#       Insert  Delete  Space  Tab  Return  Backspace  Escape

# Clipboard
copy  = Ctrl+Shift+C
paste = Ctrl+Shift+V

# Font size
increase_font = Ctrl+Equal
decrease_font = Ctrl+Minus
reset_font    = Ctrl+0

# Scrollback
scroll_up   = Shift+PageUp
scroll_down = Shift+PageDown

# Screen
clear_screen = Ctrl+L

# New window (spawns a second A-term process)
new_window = Ctrl+Shift+N
