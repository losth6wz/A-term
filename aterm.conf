# =============================================================================
#  aterm.conf  –  A-term configuration file
#  INI format.  Lines starting with # or ; are comments.
#  Reload at runtime by pressing Ctrl+Shift+R  (not yet implemented).
# =============================================================================


# -----------------------------------------------------------------------------
[window]
# -----------------------------------------------------------------------------

# Window title shown in the title bar
title = A-term

# Initial window size in pixels
width  = 960
height = 640

# Window opacity: 1.0 = fully opaque, 0.1 = almost transparent
opacity = 1.0

# Inner padding in pixels (gap between edge of window and the text grid)
padding = 6

# Optional icon file path (.ico/.png/.jpg). Leave blank to use bundled icon.
# icon = C:\\path\\to\\icon.ico
icon =


# -----------------------------------------------------------------------------
[font]
# -----------------------------------------------------------------------------

# Font family.  Must be a monospace font installed on the system.
# Examples: Consolas, Cascadia Code, JetBrains Mono, Fira Code, Courier New
family = Consolas

# Font size in points
size = 11


# -----------------------------------------------------------------------------
[cursor]
# -----------------------------------------------------------------------------

# Cursor shape: block | underline | beam
style = block

# Whether the cursor blinks when the window is focused
blink = true

# Blink interval in milliseconds
blink_rate = 500


# -----------------------------------------------------------------------------
[scrollback]
# -----------------------------------------------------------------------------

# Maximum number of lines kept in the scrollback history
lines = 10000

# Lines scrolled per mouse-wheel notch
scroll_speed = 3


# -----------------------------------------------------------------------------
[theme]
# -----------------------------------------------------------------------------

# Default foreground and background colours  (#RRGGBB)
foreground = #F8F8F2
background = #282A36

# Cursor block fill colour and the character colour drawn on top of it
cursor      = #FFFFFF
cursor_text = #0C0C0C

# Text selection
selection_bg = #264F78
# selection_fg = #FFFFFF   ; leave blank to use the cell's original background


# --- ANSI 16-colour palette ---
# Normal colours (0–7)
color0  = #000000   ; black
color1  = #FF5555   ; red
color2  = #50FA7B   ; green
color3  = #F1FA8C   ; yellow
color4  = #BD93F9   ; blue
color5  = #FF79C6   ; magenta
color6  = #8BE9FD   ; cyan
color7  = #BFBFBF   ; white (light grey)

# Bright colours (8–15)
color8  = #4D4D4D   ; bright black  (dark grey)
color9  = #FF6E67   ; bright red
color10 = #5AF78E   ; bright green
color11 = #F4F99D   ; bright yellow
color12 = #CAA9FA   ; bright blue
color13 = #FF92D0   ; bright magenta
color14 = #9AEDFE   ; bright cyan
color15 = #E6E6E6   ; bright white


